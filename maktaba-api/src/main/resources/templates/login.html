<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Maktaba - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
<div class="card shadow p-4" style="width: 400px;">
    <h2 class="text-center mb-3">📚 Maktaba</h2>
    <h5 class="text-center text-muted mb-4">Entrar</h5>

    <form action="/usuarios/login" method="post">
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Usuário" required/>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Senha" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <p class="text-center mt-3">
        <a href="/recuperar-senha" class="text-decoration-none">Esqueci minha senha</a>
    </p>
    <p class="text-center">
        Novo por aqui? <a href="/usuarios/cadastro" class="text-decoration-none">Cadastre-se</a>
    </p>
    <p class="text-center">
        <a href="/sobre" class="text-decoration-none text-muted">Conheça o Maktaba</a>
    </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
