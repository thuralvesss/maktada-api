<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Meus Gêneros - Maktaba</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">📚 Maktaba</a>
    <a href="/perfil" class="btn btn-outline-light btn-sm">← Voltar ao Perfil</a>
</nav>

<div class="container py-5" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">📚 Meus Gêneros Literários</h4>
        </div>
        <div class="card-body">
            <p class="text-muted">Escolha entre <strong>1 e 8 gêneros</strong> que mais combinam com você.</p>

            <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

            <form action="/perfil/generos" method="post">
                <div class="row g-3 mb-4">
                    <div th:each="genero : ${todosGeneros}" class="col-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox"
                                   name="generos"
                                   th:value="${genero}"
                                   th:id="${genero}"
                                   th:checked="${generosEscolhidos.contains(genero)}"
                                   onchange="validarSelecao()"/>
                            <label class="form-check-label" th:for="${genero}" th:text="${genero}"></label>
                        </div>
                    </div>
                </div>

                <div id="avisoMax" class="alert alert-warning d-none">
                    Você pode escolher no máximo 8 gêneros!
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <span id="contador" class="text-muted small">0 gêneros selecionados</span>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function validarSelecao() {
        const checkboxes = document.querySelectorAll('input[name="generos"]:checked');
        const total = checkboxes.length;
        const aviso = document.getElementById('avisoMax');
        const contador = document.getElementById('contador');

        contador.textContent = total + ' gênero(s) selecionado(s)';

        if (total > 8) {
            aviso.classList.remove('d-none');
            // desmarca o último
            const todos = document.querySelectorAll('input[name="generos"]');
            todos.forEach(cb => { if (!cb.checked) return; });
        } else {
            aviso.classList.add('d-none');
        }
    }

    // inicializa o contador
    validarSelecao();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
