<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Maktaba</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        h1 { color: #333; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { background: white; border-radius: 8px; padding: 15px; width: 200px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 280px; object-fit: cover; border-radius: 4px; }
        .card h3 { font-size: 14px; margin: 10px 0 5px; }
        .card p { font-size: 12px; color: #666; }
        .btn { display: inline-block; margin-top: 10px; padding: 5px 10px; background: #007bff; color: white; border-radius: 4px; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
<h1>📚 Catálogo de Livros</h1>
<a href="/livros/admin/novo" class="btn">+ Adicionar Livro</a>
<br><br>
<div class="grid">
    <div th:each="livro : ${livros}" class="card">
        <img th:src="${livro.imagemUrl}" th:alt="${livro.titulo}" onerror="this.src='https://via.placeholder.com/200x280?text=Sem+Capa'"/>
        <h3 th:text="${livro.titulo}">Título</h3>
        <p th:text="${livro.autor}">Autor</p>
        <p th:text="${livro.genero}">Gênero</p>
    </div>
</div>
</body>
</html>
