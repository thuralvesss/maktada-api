<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Maktaba</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">📚 Maktaba</a>
    <div>
        <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
        <a href="/assinatura/planos" class="btn btn-outline-light btn-sm me-2">Assinar</a>
        <a href="/perfil" class="btn btn-outline-light btn-sm">Meu Perfil</a>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📚 Catálogo de Livros</h2>
        <a href="/livros/admin/novo" class="btn btn-success">+ Adicionar Livro</a>
    </div>

    <div class="row g-4">
        <div th:each="livro : ${livros}" class="col-md-3 col-sm-6">
            <div class="card h-100 shadow-sm">
                <img th:src="${livro.imagemUrl}"
                     th:alt="${livro.titulo}"
                     class="card-img-top"
                     style="height: 280px; object-fit: cover;"
                     onerror="this.src='https://via.placeholder.com/200x280?text=Sem+Capa'"/>
                <div class="card-body">
                    <h6 class="card-title fw-bold" th:text="${livro.titulo}"></h6>
                    <p class="card-text text-muted small" th:text="${livro.autor}"></p>
                    <span class="badge bg-primary" th:text="${livro.genero}"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>ml>
