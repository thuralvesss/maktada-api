<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin - Maktaba</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">📚 Maktaba — Admin</a>
    <div>
        <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
        <a href="/livros/admin/novo" class="btn btn-outline-light btn-sm me-2">+ Livro</a>
        <form action="/logout" method="post" class="d-inline">
            <button class="btn btn-danger btn-sm">Sair</button>
        </form>
    </div>
</nav>

<div class="container py-4">
    <h2 class="mb-4">📊 Dashboard Administrativo</h2>

    <!-- Cards de resumo -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card shadow text-center border-success">
                <div class="card-body">
                    <h1 class="text-success" th:text="${ativas}">0</h1>
                    <p class="text-muted mb-0">Assinaturas Ativas</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow text-center border-warning">
                <div class="card-body">
                    <h1 class="text-warning" th:text="${pausadas}">0</h1>
                    <p class="text-muted mb-0">Assinaturas Pausadas</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow text-center border-danger">
                <div class="card-body">
                    <h1 class="text-danger" th:text="${canceladas}">0</h1>
                    <p class="text-muted mb-0">Assinaturas Canceladas</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow text-center border-primary">
                <div class="card-body">
                    <h1 class="text-primary">R$<span th:text="${faturamento}">0</span></h1>
                    <p class="text-muted mb-0">Faturamento Mensal</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h1 th:text="${totalUsuarios}">0</h1>
                    <p class="text-muted mb-0">Total de Usuários</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h1 th:text="${totalLivros}">0</h1>
                    <p class="text-muted mb-0">Livros no Catálogo</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabela de assinaturas -->
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">📋 Lista de Assinaturas</h5>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Usuário</th>
                    <th>Plano</th>
                    <th>Status</th>
                    <th>Início</th>
                    <th>Renovação</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="assinatura : ${assinaturas}">
                    <td th:text="${assinatura.usuario.nome}"></td>
                    <td><span class="badge bg-primary" th:text="${assinatura.plano}"></span></td>
                    <td>
                                <span class="badge"
                                      th:classappend="${assinatura.status == 'ATIVA'} ? 'bg-success' : (${assinatura.status == 'CANCELADA'} ? 'bg-danger' : 'bg-warning')"
                                      th:text="${assinatura.status}"></span>
                    </td>
                    <td th:text="${assinatura.dataInicio}"></td>
                    <td th:text="${assinatura.dataRenovacao}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>ml>
