<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Maktaba - Cadastro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100 py-4">
<div class="card shadow p-4" style="width: 420px;">
    <h2 class="text-center mb-1">📚 Maktaba</h2>
    <h5 class="text-center text-muted mb-4">Criar Conta</h5>

    <form action="/usuarios/registrar" method="post">
        <div class="mb-3">
            <input type="text" name="nome" class="form-control" placeholder="Nome Completo" required/>
        </div>
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Nome de Usuário" required/>
        </div>
        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="E-mail" required/>
        </div>
        <div class="mb-3">
            <input type="password" name="senhaHash" class="form-control" placeholder="Senha" required/>
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small">Data de Nascimento</label>
            <input type="date" name="dataNascimento" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
