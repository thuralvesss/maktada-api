<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil - Maktaba</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">📚 Maktaba</a>
    <div>
        <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
        <a href="/livros/catalogo" class="btn btn-outline-light btn-sm me-2">Catálogo</a>
        <a href="/assinatura/planos" class="btn btn-outline-light btn-sm">Planos</a>
    </div>
</nav>

<div class="container py-4" style="max-width: 600px;">

    <div class="card shadow mb-4">
        <div class="card-body text-center">
            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                 style="width:80px; height:80px; font-size:32px;">👤</div>
            <h4 th:text="${usuario.nome}"></h4>
            <p class="text-muted" th:text="${usuario.username}"></p>
        </div>
    </div>

    <div class="card shadow mb-4">
        <div class="card-header fw-bold">Meus Dados</div>
        <div class="card-body">
            <div class="row py-2 border-bottom">
                <div class="col text-muted">Email</div>
                <div class="col text-end fw-bold" th:text="${usuario.email}"></div>
            </div>
            <div class="row py-2 border-bottom">
                <div class="col text-muted">Data de Nascimento</div>
                <div class="col text-end fw-bold" th:text="${usuario.dataNascimento}"></div>
            </div>
            <div class="row py-2">
                <div class="col text-muted">Interesses</div>
                <div class="col text-end fw-bold" th:text="${usuario.interessesLiterarios ?: 'Não informado'}"></div>
            </div>
        </div>
    </div>

    <div class="card shadow mb-4">
        <div class="card-header fw-bold">Minha Assinatura</div>
        <div class="card-body">
            <div th:if="${assinatura}">
                <div class="row py-2 border-bottom">
                    <div class="col text-muted">Plano</div>
                    <div class="col text-end fw-bold" th:text="${assinatura.plano}"></div>
                </div>
                <div class="row py-2 border-bottom">
                    <div class="col text-muted">Status</div>
                    <div class="col text-end">
                            <span class="badge"
                                  th:classappend="${assinatura.status == 'ATIVA'} ? 'bg-success' : (${assinatura.status == 'CANCELADA'} ? 'bg-danger' : 'bg-warning')"
                                  th:text="${assinatura.status}"></span>
                    </div>
                </div>
                <div class="row py-2">
                    <div class="col text-muted">Renovação</div>
                    <div class="col text-end fw-bold" th:text="${assinatura.dataRenovacao}"></div>
                </div>
                <div class="mt-3">
                    <a href="/assinatura/planos" class="btn btn-primary btn-sm me-2">Trocar Plano</a>
                    <form action="/assinatura/cancelar" method="post" class="d-inline">
                        <button class="btn btn-danger btn-sm">Cancelar Assinatura</button>
                    </form>
                </div>
            </div>
            <div th:unless="${assinatura}">
                <p class="text-muted">Você não possui assinatura ativa.</p>
                <a href="/assinatura/planos" class="btn btn-primary btn-sm">Ver Planos</a>
            </div>
        </div>
    </div>

    <div class="text-center">
        <form action="/logout" method="post">
            <button class="btn btn-danger">Sair da conta</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
