<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Maktaba - Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">📚 Maktaba</a>
    <div>
        <a href="/livros/catalogo" class="btn btn-outline-light btn-sm me-2">Catálogo</a>
        <a href="/assinatura/planos" class="btn btn-outline-light btn-sm me-2">Assinar</a>
        <a href="/perfil" class="btn btn-outline-light btn-sm me-2">Meu Perfil</a>
        <form action="/logout" method="post" class="d-inline">
            <button class="btn btn-danger btn-sm">Sair</button>
        </form>
    </div>
</nav>

<div class="bg-dark text-white text-center py-5">
    <h1 class="display-5 fw-bold">Bem-vindo ao Maktaba! 📖</h1>
    <p class="lead text-secondary">Sua plataforma de assinatura de livros mensais</p>
    <a href="/livros/catalogo" class="btn btn-primary btn-lg">Ver Catálogo</a>
</div>

<div class="container py-5">
    <div class="row g-4 justify-content-center">
        <div class="col-md-3">
            <div class="card text-center shadow h-100">
                <div class="card-body">
                    <h3>📚</h3>
                    <h5 class="card-title">Catálogo</h5>
                    <p class="card-text text-muted">Explore nossos livros disponíveis</p>
                    <a href="/livros/catalogo" class="btn btn-primary btn-sm">Acessar</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center shadow h-100">
                <div class="card-body">
                    <h3>📋</h3>
                    <h5 class="card-title">Assinatura</h5>
                    <p class="card-text text-muted">Escolha seu plano de leitura</p>
                    <a href="/assinatura/planos" class="btn btn-primary btn-sm">Ver Planos</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center shadow h-100">
                <div class="card-body">
                    <h3>👤</h3>
                    <h5 class="card-title">Perfil</h5>
                    <p class="card-text text-muted">Gerencie seus dados</p>
                    <a href="/perfil" class="btn btn-primary btn-sm">Acessar</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
